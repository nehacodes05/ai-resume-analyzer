<!DOCTYPE html>
<html>
<head>
    <title>Analysis History</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            background:white;
            max-width:900px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
        }

        th{
            background:#4f46e5;
            color:white;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Previous Analyses</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Target Role</th>
            <th>Date</th>
        </tr>

        {% for r in records %}

        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
